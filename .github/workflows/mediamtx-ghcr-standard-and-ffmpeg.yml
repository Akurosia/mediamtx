name: Build and publish GHCR images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/akurosia/mediamtx

jobs:
  binaries:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Build MediaMTX binaries
        run: make binaries

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: binaries
          retention-days: 1

  docker:
    needs: binaries
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: standard
            dockerfile: docker/standard.Dockerfile
            suffix: ""
          - variant: ffmpeg
            dockerfile: docker/ffmpeg.Dockerfile
            suffix: "-ffmpeg"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          name: binaries
          path: binaries

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest${{ matrix.suffix }},enable={{is_default_branch}}
            type=ref,event=tag,suffix=${{ matrix.suffix }}
            type=sha,prefix=sha-,suffix=${{ matrix.suffix }}

      - name: Build and publish ${{ matrix.variant }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
